name: Multi-Platform Release Build v0.38
run-name: Release build for ${{ github.ref_name }} @ ${{ github.sha }}

on:
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  RELEASE_TAG: v0.38
  RELEASE_ARTIFACT_PREFIX: bookstore-management-system-v0.38
  RELEASE_BODY: "Release v0.38: synced spreadsheet checkbox selection with the product detail panel so the right-side detail view now follows checkbox-driven row selection, while keeping multi-select export behavior intact."

jobs:
  build-ios:
    name: 🎉 iOS Build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.4"
          channel: stable
          architecture: x64

      - run: flutter clean
      - run: flutter pub get

      - name: Create .env file
        run: |
          echo "DB_NAME=${{ secrets.DB_NAME }}" >> .env
          echo "DEFAULT_PWD=${{ secrets.DEFAULT_PWD }}" >> .env
          echo "SERVICE_TYPE=${{ secrets.SERVICE_TYPE }}" >> .env
          echo "SERVICE_PORT=${{ secrets.SERVICE_PORT }}" >> .env

      - run: rm -rf Podfile.lock Pods
      - run: pod repo update
        working-directory: ios

      - run: flutter build ios --release --no-codesign

      - run: mkdir Payload
        working-directory: build/ios/iphoneos

      - run: mv Runner.app/ Payload
        working-directory: build/ios/iphoneos

      - name: Zip iOS output
        run: zip -qq -r -9 "${{ env.RELEASE_ARTIFACT_PREFIX }}-ios.ipa" Payload
        working-directory: build/ios/iphoneos

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-ios
          path: build/ios/iphoneos/${{ env.RELEASE_ARTIFACT_PREFIX }}-ios.ipa
          if-no-files-found: error

  build-android:
    name: 🤖 Android Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.4"
          channel: stable
          architecture: x64

      - run: flutter clean
      - run: flutter pub get

      - name: Create .env file
        run: |
          echo "DB_NAME=${{ secrets.DB_NAME }}" >> .env
          echo "DEFAULT_PWD=${{ secrets.DEFAULT_PWD }}" >> .env
          echo "SERVICE_TYPE=${{ secrets.SERVICE_TYPE }}" >> .env
          echo "SERVICE_PORT=${{ secrets.SERVICE_PORT }}" >> .env

      - name: Build Android APK
        run: flutter build apk --release

      - name: Standardize Android artifact name
        run: |
          mkdir -p build/artifacts
          cp build/app/outputs/flutter-apk/app-release.apk build/artifacts/${{ env.RELEASE_ARTIFACT_PREFIX }}-android.apk

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-android
          path: build/artifacts/${{ env.RELEASE_ARTIFACT_PREFIX }}-android.apk
          if-no-files-found: error

  build-macos:
    name: 🍏 macOS Build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.4"
          channel: stable
          architecture: x64

      - run: flutter clean
      - run: flutter pub get

      - name: Create .env file
        run: |
          echo "DB_NAME=${{ secrets.DB_NAME }}" >> .env
          echo "DEFAULT_PWD=${{ secrets.DEFAULT_PWD }}" >> .env
          echo "SERVICE_TYPE=${{ secrets.SERVICE_TYPE }}" >> .env
          echo "SERVICE_PORT=${{ secrets.SERVICE_PORT }}" >> .env

      - run: flutter build macos --release

      - name: Zip macOS output
        run: zip -qq -r -9 "${{ env.RELEASE_ARTIFACT_PREFIX }}-macos.zip" . -i Runner.app
        working-directory: build/macos/Build/Products/Release

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-macos
          path: build/macos/Build/Products/Release/${{ env.RELEASE_ARTIFACT_PREFIX }}-macos.zip
          if-no-files-found: error

  build-windows:
    name: 🖥️ Windows Build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.4"
          channel: stable
          architecture: x64

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Flutter doctor
        run: flutter doctor -v

      - run: flutter clean
      - run: flutter pub get

      - name: Create .env file
        shell: pwsh
        run: |
          @"
          DB_NAME=${{ secrets.DB_NAME }}
          DEFAULT_PWD=${{ secrets.DEFAULT_PWD }}
          SERVICE_TYPE=${{ secrets.SERVICE_TYPE }}
          SERVICE_PORT=${{ secrets.SERVICE_PORT }}
          "@ | Set-Content -Path .env

      - name: Build Windows app
        run: flutter build windows --release

      - name: Inspect Windows build output
        if: always()
        shell: pwsh
        run: |
          $releasePath = "build/windows/x64/runner/Release"
          Write-Host "Checking release path: $releasePath"
          if (Test-Path $releasePath) {
            Get-ChildItem -Path $releasePath -Recurse | Select-Object FullName
          } else {
            Write-Host "Release path does not exist."
          }

      - name: Package Windows output
        shell: pwsh
        run: |
          $releasePath = "build/windows/x64/runner/Release"
          $artifactPath = "build/artifacts/${{ env.RELEASE_ARTIFACT_PREFIX }}-windows.zip"

          if (!(Test-Path $releasePath)) {
            throw "Windows build output not found at $releasePath"
          }

          New-Item -ItemType Directory -Force -Path "build/artifacts" | Out-Null
          if (Test-Path $artifactPath) {
            Remove-Item $artifactPath -Force
          }

          Compress-Archive -Path "$releasePath/*" -DestinationPath $artifactPath -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: build/artifacts/${{ env.RELEASE_ARTIFACT_PREFIX }}-windows.zip
          if-no-files-found: error

  publish-release:
    name: 🚀 Publish Release Assets
    runs-on: ubuntu-latest
    needs: [build-ios, build-android, build-macos, build-windows]
    steps:
      - name: Download iOS artifact
        uses: actions/download-artifact@v4
        with:
          name: release-ios
          path: dist/ios

      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: release-android
          path: dist/android

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: release-macos
          path: dist/macos

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: release-windows
          path: dist/windows

      - name: Upload iOS binaries to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist/ios/${{ env.RELEASE_ARTIFACT_PREFIX }}-ios.ipa
          tag: ${{ env.RELEASE_TAG }}
          overwrite: true
          body: ${{ env.RELEASE_BODY }}

      - name: Upload Android binaries to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist/android/${{ env.RELEASE_ARTIFACT_PREFIX }}-android.apk
          tag: ${{ env.RELEASE_TAG }}
          overwrite: true
          body: ${{ env.RELEASE_BODY }}

      - name: Upload macOS binaries to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist/macos/${{ env.RELEASE_ARTIFACT_PREFIX }}-macos.zip
          tag: ${{ env.RELEASE_TAG }}
          overwrite: true
          body: ${{ env.RELEASE_BODY }}

      - name: Upload Windows binaries to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist/windows/${{ env.RELEASE_ARTIFACT_PREFIX }}-windows.zip
          tag: ${{ env.RELEASE_TAG }}
          overwrite: true
          body: ${{ env.RELEASE_BODY }}
