name: Multi-Platform Release Build v0.34

on:
  workflow_dispatch:

jobs:
  build-ios:
    name: 🎉 iOS Build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          architecture: x64
      - run: flutter clean
      - run: flutter pub get

      - name: Create .env file
        run: |
          echo "SUPABASE_URL=${{ secrets.SERVICE_TYPE }}" >> .env
          echo "SUPABASE_KEY=${{ secrets.SERVICE_PORT }}" >> .env
      
      - run: rm -rf Podfile.lock Pods 
      - run: pod repo update
        working-directory: ios

      - run: flutter build ios --release --no-codesign

      - run: mkdir Payload
        working-directory: build/ios/iphoneos

      - run: mv Runner.app/ Payload
        working-directory: build/ios/iphoneos

      - name: Zip iOS output
        run: zip -qq -r -9 BMS.ipa Payload
        working-directory: build/ios/iphoneos

      - name: Upload iOS binaries to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: build/ios/iphoneos/BMS.ipa
          tag: v0.34
          overwrite: true
          body: "Release v0.34: spreadsheet-style product query/export, ISBN scanner stability fixes, and Windows packaging workflow repair."

  build-android:
    name: 🤖 Android Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v3
        with:
          distribution: "zulu"
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          architecture: x64

      - run: flutter pub get

      - name: Create .env file
        run: |
          echo "SUPABASE_URL=${{ secrets.SERVICE_TYPE }}" >> .env
          echo "SUPABASE_KEY=${{ secrets.SERVICE_PORT }}" >> .env

      - name: Build Android APK
        run: flutter build apk --release

      - name: Upload Android binaries to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: build/app/outputs/flutter-apk/app-release.apk
          tag: v0.34
          overwrite: true
          body: "Release v0.34: spreadsheet-style product query/export, ISBN scanner stability fixes, and Windows packaging workflow repair."
  build-macos:
    name: 🍏 macOS Build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          architecture: x64
      - run: flutter clean
      - run: flutter pub get

      - name: Create .env file
        run: |
          echo "SUPABASE_URL=${{ secrets.SERVICE_TYPE }}" >> .env
          echo "SUPABASE_KEY=${{ secrets.SERVICE_PORT }}" >> .env

      - run: flutter build macos --release

      - name: Zip macOS output
        run: zip -qq -r -9 BMS-macos.zip . -i Runner.app
        working-directory: build/macos/Build/Products/Release

      - name: Upload macOS binaries to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: build/macos/Build/Products/Release/BMS-macos.zip
          tag: v0.34
          overwrite: true
          body: "Release v0.34: spreadsheet-style product query/export, ISBN scanner stability fixes, and Windows packaging workflow repair."
  build-windows:
    name: 🖥️ Windows Build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          architecture: x64

      - run: flutter clean
      - run: flutter pub get

      - name: Create .env file
        run: |
          echo "SUPABASE_URL=${{ secrets.SERVICE_TYPE }}" >> .env
          echo "SUPABASE_KEY=${{ secrets.SERVICE_PORT }}" >> .env

      - run: flutter build windows --release

      - name: Package Windows output
        shell: pwsh
        run: |
          $releasePath = "build/windows/x64/runner/Release"
          $artifactPath = "build/artifacts/BMS-windows-v0.34.zip"

          if (!(Test-Path $releasePath)) {
            throw "Windows build output not found at $releasePath"
          }

          New-Item -ItemType Directory -Force -Path "build/artifacts" | Out-Null
          if (Test-Path $artifactPath) {
            Remove-Item $artifactPath -Force
          }

          Compress-Archive -Path "$releasePath/*" -DestinationPath $artifactPath -Force

      - name: Upload Windows binaries to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: build/artifacts/BMS-windows-v0.34.zip
          tag: v0.34
          overwrite: true
          body: "Release v0.34: spreadsheet-style product query/export, ISBN scanner stability fixes, and Windows packaging workflow repair."
