name: bookstore_management_system
description: "A new Flutter project."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  drift: ^2.26.0
  flutter_screenutil: ^5.9.3
  drift_flutter: ^0.3.0
  equatable:
  path_provider:
  path:
  get_it: ^9.2.1
  flutter_dotenv: ^6.0.0
  go_router: ^17.1.0
  freezed: ^3.0.4
  intl: ^0.20.2
  file_picker: ^10.0.0
  system_tray: ^2.0.3
  window_manager: ^0.5.1
  syncfusion_flutter_datagrid: ^33.1.44
  flutter_spinkit: ^5.2.1
  fluttertoast: ^9.0.0
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0
  sqlite3_flutter_libs: ^0.6.0+eol
  fpdart: ^1.1.1
  bcrypt: ^1.1.3
  shared_preferences: ^2.5.3
  json_serializable: ^6.9.4
  flutter_bloc: ^9.1.0
  hive:
  hive_flutter:
  encrypt:
  showcaseview: ^5.0.1
  logger: ^2.5.0
  flutter_lite_camera: ^0.0.1
  mobile_scanner: ^7.0.0
  http: ^1.4.0
  provider: ^6.1.5
  permission_handler: ^12.0.0+1
  multicast_dns: ^0.3.3
  dio: ^5.8.0+1
  shelf: ^1.4.2
  shelf_router: ^1.1.4
  bonsoir: ^6.0.2
  audioplayers: ^6.4.0
  desktop_multi_window: ^0.3.0
  sqlite3: ^3.2.0
  flutter_native_splash: ^2.4.6
  flutter_launcher_icons: ^0.14.3
  uuid: ^3.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  drift_dev: ^2.26.0
  build_runner: ^2.4.15

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/icon.png"
  adaptive_icon_foreground: "assets/icons/icon.png"
  adaptive_icon_background: "#fff"
  windows:
    generate: true
    image_path: "assets/icons/icon.png"
    icon_size: 48
  macos:
    generate: true
    image_path: "assets/icons/icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/
    - assets/sounds/
    - .env

  fonts:
    - family: NotoSansSC
      fonts:
        - asset: assets/fonts/NotoSansSC-VariableFont_wght.ttf
