name: bookstore_management_system
description: "A new Flutter project."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  drift: ^2.32.1
  equatable:
  path_provider:
  path:
  get_it: ^9.2.1
  flutter_dotenv: ^6.0.0
  intl: ^0.20.2
  file_picker: ^10.0.0
  window_manager: ^0.5.1
  syncfusion_flutter_datagrid: ^33.1.46
  fluttertoast: ^9.0.0
  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0
  sqlite3_flutter_libs: ^0.6.0+eol
  fpdart: ^1.1.1
  bcrypt: ^1.1.3
  flutter_bloc: ^9.1.0
  hive:
  hive_flutter:
  encrypt:
  logger: ^2.5.0
  mobile_scanner: ^7.0.0
  http: ^1.4.0
  provider: ^6.1.5
  permission_handler: ^12.0.0+1
  webview_windows: ^0.4.0
  shelf: ^1.4.2
  shelf_router: ^1.1.4
  bonsoir: ^6.0.2
  audioplayers: ^6.4.0
  desktop_multi_window:
    path: packages/desktop_multi_window
  sqlite3: ^3.2.0
  uuid: ^4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.4

  flutter_lints: ^6.0.0
  drift_dev: ^2.32.1
  build_runner: ^2.4.15
  freezed: ^3.2.5
  json_serializable: ^6.13.1
  flutter_native_splash: ^2.4.7
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/icon.png"
  adaptive_icon_foreground: "assets/icons/icon.png"
  adaptive_icon_background: "#fff"
  windows:
    generate: true
    image_path: "assets/icons/icon.png"
    icon_size: 48
  macos:
    generate: true
    image_path: "assets/icons/icon.png"

hooks:
  user_defines:
    sqlite3:
      # Avoid sqlite3 v3 build hooks downloading precompiled binaries from
      # GitHub at build time, which is unreliable in restricted networks.
      source: system
      # Windows ships a different system SQLite library name.
      name_windows: winsqlite3
      name: sqlite3

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/
    - assets/sounds/
    - assets/scanner/
    - .env

  fonts:
    - family: NotoSansSC
      fonts:
        - asset: assets/fonts/NotoSansSC-VariableFont_wght.ttf
